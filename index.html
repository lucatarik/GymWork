    useEffect(() => {

            let interval;

                if (e.data === 'start') {
                    interval = setInterval(() => self.postMessage('tick'), 1000);
                } else if (e.data === 'stop') {
                    clearInterval(interval);

        `;

        worker.onmessage = () => {

// Init Audio

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(vol, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration/1000);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + duration/1000);
        } catch (e) { console.error("Beep err:", e); }

        if (!audioEnabled) return;
        const quote = HARTMAN_QUOTES[Math.floor(Math.random() * HARTMAN_QUOTES.length)];
        
        const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
        if (window.speechSynthesis && voices.length > 0) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(quote);
            msg.lang = 'it-IT';
            msg.rate = 1.1;
            msg.pitch = 0.8;
            window.speechSynthesis.speak(msg);
        } else {
            // Se le API vocali di sistema falliscono, invoca il demone a 8-bit!
            playRobotSpeech(quote);
        }
    };

    // --- LOGICA LONG PRESS E CLICK ---
    const handlePointerDown = (ex) => {
        if (isEditMode) return;
        isLongPressRef.current = false;
        longPressTimerRef.current = setTimeout(() => {
            isLongPressRef.current = true;
            const query = encodeURIComponent(`${ex.name} tutorial esecuzione palestra italiano`);
            window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
        }, 600); // 600ms per attivare la ricerca Youtube
    };
  
  // --- PROGRESSIONE AUTOMATICA ---
    const progressWeight = (weightStr) => {
        const num = parseFloat(weightStr.replace(/[^0-9.]/g, ''));
        if (isNaN(num) || num === 0) return weightStr;
        // Aumenta del 2.5% e arrotonda al 0.5 più vicino
        const newWeight = (Math.round((num * 1.025) * 2) / 2).toFixed(1);
        return `${newWeight}KG`;
    };

    const handlePointerUp = (ex) => {
        if (isEditMode) return;
        clearTimeout(longPressTimerRef.current);
        
        // Se NON è stato un long press, trattalo come un normale completamento di Set
        if (!isLongPressRef.current) {
            const currentSets = sessionState[ex.id] !== undefined ? sessionState[ex.id] : getSets(ex.setsReps);
            
            if (currentSets > 1) {
              setSessionState(prev => ({ ...prev, [ex.id]: currentSets - 1 }));
              lastClickRef.current = Date.now();
              speakHartman();
          } else if (currentSets === 1) {
              // ESERCIZIO FINITO -> AUMENTA PESO PER LA PROSSIMA VOLTA
              setSessionState(prev => ({ ...prev, [ex.id]: 0 }));
              const newConfig = config.map(day => ({
                  ...day,
                  exercises: day.exercises.map(e => {
                      if (e.id === ex.id) {
                          const newW = progressWeight(e.weight);
                          return { ...e, weight: newW, lastIncrease: true };
                      }
                      return e;
                  })
              }));
              setConfig(newConfig);
          }
          handleTimerReset();
          speakHartman(); // Sgrida l'utente!
        }
    };

    const handlePointerLeave = () => {
        // Se scrollo o esco dalla card, annullo il timer del long press
        clearTimeout(longPressTimerRef.current);
    };

    const resetExercise = (ex) => {
        if (isEditMode) return;
        setSessionState(prev => ({ ...prev, [ex.id]: getSets(ex.setsReps) }));
    };

    // --- FUNZIONI CRUD ---
    const addDay = () => {
        setConfig([...config, { id: generateId(), title: "Nuovo Giorno", exercises: [] }]);
        setActiveDayIdx(config.length);
    };
    const updateDayTitle = (dayId, newTitle) => setConfig(config.map(d => d.id === dayId ? { ...d, title: newTitle } : d));
    const deleteDay = (dayId) => {
        if (confirm("Eliminare l'intera scheda?")) {
            setConfig(config.filter(d => d.id !== dayId));
            setActiveDayIdx(Math.max(0, activeDayIdx - 1));
        }
    };
    const addExercise = (dayId) => setConfig(config.map(d => d.id === dayId ? { ...d, exercises: [...d.exercises, { id: generateId(), name: "Nuovo Esercizio", desc: "Note...", setsReps: "3 x 10", weight: "0kg" }] } : d));
    const updateExercise = (dayId, exId, field, value) => setConfig(config.map(d => d.id === dayId ? { ...d, exercises: d.exercises.map(ex => ex.id === exId ? { ...ex, [field]: value } : ex) } : d));
    const moveExercise = (dayId, index, direction) => {
        setConfig(config.map(d => {
            if (d.id === dayId) {
                const newExs = [...d.exercises];
                const targetIdx = index + direction;
                if (targetIdx >= 0 && targetIdx < newExs.length) [newExs[index], newExs[targetIdx]] = [newExs[targetIdx], newExs[index]];
                return { ...d, exercises: newExs };
            }
            return d;
        }));
    };
    const deleteExercise = (dayId, exId) => { if (confirm("Eliminare?")) setConfig(config.map(d => d.id === dayId ? { ...d, exercises: d.exercises.filter(ex => ex.id !== exId) } : d)); };
    
    const handleImport = () => {
        try {
            const parsed = JSON.parse(importJson);
            if (!Array.isArray(parsed)) throw new Error("Il JSON deve essere un array [...]");
            const sanitized = parsed.map(day => ({
                id: generateId(), title: day.title || day.day || "Importato",
                exercises: (day.exercises || []).map(ex => ({
                    id: generateId(), name: ex.name || "Esercizio", desc: ex.desc || "", setsReps: ex.setsReps || "3 x 10", weight: ex.weight || "0kg"
                }))
            }));
            setConfig([...config, ...sanitized]); setImportJson(""); alert("Importato con successo!");
        } catch (e) { alert("Errore JSON: " + e.message); }
    };

    const activeDay = config[activeDayIdx] || null;
    // Controlla se tutti gli esercizi del giorno sono a 0 set
    const isDayCompleted = activeDay && activeDay.exercises.length > 0 && activeDay.exercises.every(ex => {
        const setsLeft = sessionState[ex.id] !== undefined ? sessionState[ex.id] : parseInt(ex.setsReps);
        return setsLeft === 0;
    });

    // Funzione per il reset del giorno e salvataggio data
    const handleResetDay = () => {
        // Salva la data di oggi per questo giorno
        const oggi = new Date().toLocaleDateString('it-IT');
        setDates(prev => ({ ...prev, [activeDay.id]: oggi }));

        // Resetta i set rimuovendoli dal sessionState (torneranno al massimo)
        const newSession = { ...sessionState };
        activeDay.exercises.forEach(ex => {
            delete newSession[ex.id];
        });
        setSessionState(newSession);

        if (window.responsiveVoice) {
            window.responsiveVoice.speak("Giornata completata! Ora sparisci dalla mia vista, larva!", "Italian Male", {pitch: 0.2, rate: 1.1, volume: 1});
        }
    };

    return html`
        <div>
        ${showOverlay && html`
            <div className="overlay">
                <div className="modal-content">
                <div className="hartman-pixel"><img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAB4AHgDASIAAhEBAxEB/8QAHAABAAEFAQEAAAAAAAAAAAAAAAYBBAUHCAMC/8QAUBAAAQMDAwEFAQkIDA8AAAAAAQIDBAAFEQYSITEHExRBUSIWMlJhgZGSk9IVIzdTVFVxoQgXM1ZzdHWVs8HR4SQlJjQ1NkJDcoKksbLC8P/EABkBAAIDAQAAAAAAAAAAAAAAAAACAQMEBf/EACURAAICAQQCAgIDAAAAAAAAAAABAhEDEiExQQQTUZEiYTKBof/aAAwDAQACEQMRAD8A39SlKAFKUoAVHtXawtekbb30+WhiQ+laYiVtrUHHAMhJ2jjkjrjrXpqzVMLSNhlXWWC94dKVdw2od4sKUE8An4/1Gucb/fp2sbs9Onvuu20ul6DFexmOD5ceeAKWUlFEpWTLTnbdqFd+jJ1VDtMCy+14iSy04Vo9k7cALV1VtHQ9flqdP9tGg+4c8Pf21vbT3aTFewVY4HvPWufLpsXDU0pO7eQNvy5/qrzZtMAMNrMVG7aDnnriq1l23J0m0NNdt19Xe2k6ui2u32farvZDDLhWlWPZAAWrqcDpW74M2PcrfGnxHO8jSWkvMrwRuQoApODyMgjrXJam2ZscBxAW2rB2mpz2d9osvTdybs16dkzYs11iJbgkpCIaASn2s44wpHr72mhkvZg0dBUr4afakI3suocTnG5CgR+qvurBRVapSgCtKpSgBSlKAFKUoA5r7e/wp2n+S2/6V6ovIkFlKdjZWVcDHlUm7fvwoWv+Skf0j1RWPJZTHbSpxIITyM1Rl5HiGGXVvB6QAHE8JA9P/jV2RkEeteXi2PxqPnp4tj8aj56q3JLUB6ESEo3sA8Y616vOJkQX04Iy0QoEdMivXxcf8aj56835LCo7gDiSSkgDPxVIEs7GNYXS36ttmjWe4+5Ulbzzm5GXN3dKVwrPTKB5V0lXJvZN+Gmxf8L/APQO11lWpcFbFKUqQFKUoAUJwKVEO0KVq2LZG1aRhRpUgrUJAfKQEtbTyMqTzn9NAEn8dE/KmPrBTx0T8qY+sFcQK1JcCeC2n4giqe6O4/DR9AUty+Cd <h1 style=${{marginTop: '10px'}}>RECLUTA!</h1>
<p>Stai per entrare in una zona di dolore controllato. <br/><br/> 
                       Il tuo schermo rimarrà acceso e io ti urlerò contro finché non sarai diventato un vero uomo.</p>
                    <button className="btn-combat" onClick=${handleCombatStart}>

            ${!isEditMode ? html`
                <div className="timer-box" onClick=${handleTimerReset}>
                    <div className="timer-display">${Math.floor(seconds/60).toString().padStart(2,'0')}:${(seconds%60).toString().padStart(2,'0')}</div>
                    <div style=${{fontSize:'0.7rem', color: 'var(--primary)'}}>TAP PER RESETTARE IL RECUPERO</div>
                </div>
            ` : ''}

            <div className="header-controls">
                <h3>Gym-Tracker Pro</h3>
                <div style=${{ display: 'flex', gap: '10px' }}>
                    <button onClick=${() => setAudioEnabled(!audioEnabled)} title="Attiva/Disattiva Audio" style=${{ fontSize: '1.2rem', padding: '5px 10px', background: '#333' }}>
                        ${audioEnabled ? '🔊' : '🔇'}
                    </button>
                    <button onClick=${() => speakHartman()} title="Sergente Hartman" style=${{ fontSize: '1.2rem', padding: '5px 10px', background: '#333' }}>
                        🗣️
                    </button>
                    <button onClick=${() => setIsEditMode(!isEditMode)} className=${isEditMode ? '' : 'outline'}>
                        ${isEditMode ? "💾 Salva" : "⚙️ Modifica"}
                    </button>
                </div>
            </div>

            <div className="tabs">
                ${config.map((day, idx) => html`
                    <div key=${day.id} className=${`tab ${activeDayIdx === idx ? 'active' : ''}`} onClick=${() => setActiveDayIdx(idx)}>
                        ${isEditMode 
                            ? html`<input value=${day.title} onChange=${(e) => updateDayTitle(day.id, e.target.value)} onClick=${e => e.stopPropagation()} style=${{ width: '120px', margin: 0, padding: '2px 5px' }} />` 
                            : html`<div>${day.title}</div>
                                ${dates[day.id] && html`<div style=${{fontSize: '0.6rem', color: '#888', marginTop: '3px', textTransform: 'none', fontWeight: 'normal'}}>Ultimo: ${dates[day.id]}</div>`}`
                        }
                    </div>
                `)}
                ${isEditMode && html`<button onClick=${addDay} style=${{padding: '5px 10px'}}>+ Giorno</button>`}
            </div>

            <div className="container">
                ${!activeDay ? html`<p style=${{textAlign: 'center', marginTop: '20px'}}>Nessun allenamento. Clicca ⚙️ Modifica per iniziare.</p>` : ''}

                ${!isEditMode && activeDay ? html`
                    <div>
                        <h2>Esercizi Da Fare <span style=${{fontSize:'0.6rem', color:'#888', textTransform:'none'}}>(Tieni premuto per Youtube)</span></h2>
                        ${activeDay.exercises.filter(ex => (sessionState[ex.id] !== undefined ? sessionState[ex.id] : getSets(ex.setsReps)) > 0).map(ex => {
                            const sets = sessionState[ex.id] !== undefined ? sessionState[ex.id] : getSets(ex.setsReps);
                            return html`
                                <div key=${ex.id} 
                                     className="card" 
                                     onPointerDown=${() => handlePointerDown(ex)} 
                                     onPointerUp=${() => handlePointerUp(ex)}
                                     onPointerLeave=${handlePointerLeave}
                                     onPointerCancel=${handlePointerLeave}>
                                    <div className="badge">${sets} SET</div>
                                    <strong>${ex.name}</strong>
                                    <div className="info-row">${ex.setsReps} @ <span className="highlight">${ex.weight}</span></div>
                                    <small>${ex.desc}</small>
                                </div>
                            `;
                        })}
                        
                        ${activeDay.exercises.filter(ex => sessionState[ex.id] === 0).length > 0 && html`<h2>Completati</h2>`}
                        
                        ${activeDay.exercises.filter(ex => sessionState[ex.id] === 0).map(ex => html`
                            <div key=${ex.id} className="card done" onClick=${() => resetExercise(ex)}>
                                <strong>✅ ${ex.name}</strong>
                            </div>
                        `)}
                    </div>
                ` : ''}

                ${isEditMode && activeDay ? html`
                    <div>
                        <div style=${{display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom: '1px solid #333', paddingBottom: '10px', marginBottom: '15px'}}>
                            <h2 style=${{border: 'none', padding: 0, margin: 0}}>Modifica Esercizi</h2>
                            <button className="danger" onClick=${() => deleteDay(activeDay.id)}>🗑️ Elimina Giorno</button>
                        </div>
                        
                        ${activeDay.exercises.map((ex, idx) => html`
                            <div key=${ex.id} className="edit-form">
                                <div className="flex-row" style=${{ justifyContent: 'space-between' }}>
                                    <div>
                                        <button className="icon" disabled=${idx === 0} onClick=${() => moveExercise(activeDay.id, idx, -1)}>↑</button>
                                        <button className="icon" disabled=${idx === activeDay.exercises.length - 1} onClick=${() => moveExercise(activeDay.id, idx, 1)}>↓</button>
                                    </div>
                                    <button className="danger" onClick=${() => deleteExercise(activeDay.id, ex.id)}>X</button>
                                </div>
                                <input placeholder="Nome Esercizio" value=${ex.name} onChange=${e => updateExercise(activeDay.id, ex.id, 'name', e.target.value)} />
                                <div className="flex-row">
                                    <input placeholder="Set x Rep" value=${ex.setsReps} onChange=${e => updateExercise(activeDay.id, ex.id, 'setsReps', e.target.value)} />
                                    <input placeholder="Peso" value=${ex.weight} onChange=${e => updateExercise(activeDay.id, ex.id, 'weight', e.target.value)} />
                                </div>
                                <input placeholder="Note/Descrizione" value=${ex.desc} onChange=${e => updateExercise(activeDay.id, ex.id, 'desc', e.target.value)} />
                            </div>
                        `)}
                        ${!isEditMode && isDayCompleted && html`
                    	<div style=${{marginTop: '30px', textAlign: 'center'}}>
                        	<button className="btn-combat" onClick=${handleResetDay} style=${{width: '100%', padding: '20px', fontSize: '1.2rem'}}>
                            	✅ ALLENAMENTO CONCLUSO: RESETTA E SALVA DATA
                        	</button>
                    	</div>
                		`}
                        <button onClick=${() => addExercise(activeDay.id)} style=${{ width: '100%', padding: '15px', marginTop: '10px' }}>+ Aggiungi Esercizio</button>

                        <div className="import-box">
                            <h3 style=${{marginTop: 0, color:'var(--primary)'}}>📥 Importa (JSON)</h3>
                            <textarea rows="4" placeholder="Incolla JSON qui..." value=${importJson} onChange=${e => setImportJson(e.target.value)}></textarea>
                            <button onClick=${handleImport} style=${{width: '100%'}}>Aggiungi alla Scheda</button>
                        </div>
                    </div>
                ` : ''}
            </div>
        </div>
    `;
}

const root = createRoot(document.getElementById('root'));
root.render(html`<${App} />`);
</script>
</body>
</html>
